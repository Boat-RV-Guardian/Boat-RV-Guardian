name = "boat-rv-guardian-webhooks"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# User-facing API hostname (Task 11). A Workers Custom Domain — Cloudflare manages the DNS + cert.
# Additive: the *.workers.dev route stays live, and DEFAULT_WORKER_URL is NOT flipped here (that, plus
# re-registering Shelly webhooks against the new URL, is the hardware-gated cutover step).
routes = [
  { pattern = "api.boatrvguardian.com", custom_domain = true },
]

# Daily tier-maintenance sweep (open-tasks Task 6): expire lapsed Basic trials → free and prune hosted
# history past each vehicle's tier window. 04:12 UTC — off the hour to dodge cron contention.
[triggers]
crons = ["12 4 * * *"]

[vars]
FIREBASE_PROJECT_ID = "boat-rv-guardian-9f8a4"
# The following must be set via `wrangler secret put <NAME>`:
# - FIREBASE_CLIENT_EMAIL
# - FIREBASE_PRIVATE_KEY
