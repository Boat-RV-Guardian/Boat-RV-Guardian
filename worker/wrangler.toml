name = "boat-rv-guardian-webhooks"
main = "src/index.ts"
compatibility_date = "2024-03-20"
compatibility_flags = ["nodejs_compat"]

# User-facing API hostname (Task 11): `api.boatrvguardian.com` is attached to this worker as a Workers
# Custom Domain (Cloudflare-managed DNS + cert; verified /api/health over HTTPS). It is provisioned
# MANUALLY (via `wrangler deploy` under an OAuth token with Workers Routes perms) and intentionally NOT
# listed here as a `routes`/`custom_domain` entry: the CI deploy token (CLOUDFLARE_PAGES_EDIT) lacks
# Workers Routes:Edit, so a route in this file makes every CI `wrangler deploy` fail with auth 10000.
# To make it config-managed, grant that GH secret Workers Routes:Edit, then add:
#   routes = [{ pattern = "api.boatrvguardian.com", custom_domain = true }]
# Additive — the *.workers.dev route stays live and DEFAULT_WORKER_URL is unchanged (flipping it +
# re-registering Shelly webhooks is the hardware-gated cutover step).

# Daily tier-maintenance sweep (open-tasks Task 6): expire lapsed Basic trials → free and prune hosted
# history past each vehicle's tier window. 04:12 UTC — off the hour to dodge cron contention.
[triggers]
crons = ["12 4 * * *"]

[vars]
FIREBASE_PROJECT_ID = "boat-rv-guardian-9f8a4"
# The following must be set via `wrangler secret put <NAME>`:
# - FIREBASE_CLIENT_EMAIL
# - FIREBASE_PRIVATE_KEY
