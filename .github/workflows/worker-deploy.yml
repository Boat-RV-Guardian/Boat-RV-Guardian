name: Deploy Webhooks Worker

# Deploys the boat-rv-guardian-webhooks Cloudflare Worker (Shelly webhooks -> FCM) on changes to
# worker/. The Worker's runtime secrets (FIREBASE_CLIENT_EMAIL / FIREBASE_PRIVATE_KEY) live on the
# Worker in Cloudflare (set via `wrangler secret put`) and are NOT re-set here — `wrangler deploy`
# preserves them.
on:
  push:
    branches:
      - main
    paths:
      - 'worker/**'
      - '.github/workflows/worker-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: ./worker
        run: npm ci

      - name: Deploy Worker
        working-directory: ./worker
        # Reuses the CLOUDFLARE_PAGES_EDIT token; it must also carry the Workers Scripts:Edit scope.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_EDIT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
