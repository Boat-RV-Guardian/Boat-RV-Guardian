name: CI

# Quality gate for pull requests and pushes to main. Runs the dashboard unit tests + typecheck.
# The deploy workflow (deploy-dashboard.yml) stays separate so this can fail a PR without triggering
# a deploy. (The webhook worker was retired from this repo — it now lives in brvg-cloud-server.)
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Typecheck
        working-directory: ./dashboard
        run: npx tsc -b

      - name: Unit Tests (with coverage floor)
        working-directory: ./dashboard
        run: npm run test:coverage

  # The webhook worker was retired from this repo (it now lives in brvg-cloud-server, verified by that
  # repo's CI). This is a no-op placeholder so the branch-protection required "worker" status check stays
  # satisfiable. Once the owner drops "worker" from main's required checks, delete this job.
  worker:
    runs-on: ubuntu-latest
    steps:
      - run: echo "worker retired from this repo — see brvg-cloud-server (verified in its CI)"
